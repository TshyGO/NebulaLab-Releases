name: 报告问题 / Bug Report
description: 遇到 Bug 或异常行为？告诉我发生了什么
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈！填三项就够了，不用太正式。

  - type: dropdown
    id: category
    attributes:
      label: 问题类型
      options:
        - 程序崩溃 / 报错
        - 功能不正常
        - 激活 / 会员问题
        - 更新问题
        - 界面显示问题
        - 其他

  - type: textarea
    id: description
    attributes:
      label: 发生了什么
      description: 描述问题，以及怎么触发的。如果和预期不一样，也可以顺带说说你期望的结果。
      placeholder: |
        我在做 ... 的时候，发现 ...
        重现方式：1. ... 2. ... 3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 可在软件设置页面查看
      placeholder: 例如 v0.6.2
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - 其他
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 截图或日志（选填）
      description: 如果有报错信息或截图，粘贴在这里会很有帮助。
      render: shell
