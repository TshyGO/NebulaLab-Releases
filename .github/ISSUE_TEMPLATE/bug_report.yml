name: 报告问题 / Bug Report
description: 使用简练详细的语言描述你遇到的问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写一份问题报告！请提供尽可能详细的信息，以便我们快速解决。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简洁且清晰地描述这个 Bug。
      placeholder: 描述发生了什么...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 包含如何复现该问题的具体步骤。
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 发现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 描述期望的结果...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？如果可以，请附上截图。
      placeholder: 描述实际发生的情况...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 你当前运行的 Nebula Graph 版本？（可在设置中查看）
      placeholder: 例如 v1.2.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Ubuntu / Debian
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志与输出
      description: 请粘贴引擎日志或控制台报错（如有）。
      render: shell
