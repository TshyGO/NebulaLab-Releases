name: 功能建议 / Feature Request
description: 有个想法想让软件做到？说说看
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        不需要写方案，也不用想得很完整——把你想要的说清楚就好。

  - type: textarea
    id: feature
    attributes:
      label: 你希望实现什么
      description: 越具体越好。可以说说你现在是怎么做的，然后希望软件帮你做什么。
      placeholder: 我现在需要手动做 ...，希望软件能够直接 ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 使用场景（选填）
      description: 什么情况下你会用到这个功能？
      placeholder: 比如在处理 ... 类型的数据时...
