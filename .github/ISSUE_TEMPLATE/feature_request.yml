name: 功能请求 / Feature Request
description: 提交一个新的功能建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 Nebula Graph 提供反馈！

  - type: textarea
    id: motivation
    attributes:
      label: 需求背景
      description: 你的功能请求是否与某个问题有关？请描述它。
      placeholder: 当我尝试...时，我觉得不太方便。
    validations:
      required: true

  - type: textarea
    id: feature
    attributes:
      label: 功能描述
      description: 详细描述你期望的功能或解决方案。
      placeholder: 我希望 Nebula Graph 能够支持...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你是否有考虑过其他的替代方案或实现方式？
      placeholder: 我也考虑过...

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 任何其他相关的背景信息、设计构思或截图。
